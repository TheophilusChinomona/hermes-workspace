name: Build & publish Docker image

# Publishes the workspace image to GitHub Container Registry (GHCR).
#
# Tagging strategy (Athena-style — every branch is its own release channel):
#   push to main      -> :main, :main-<sha>           (devs, bleeding edge)
#   push to staging   -> :staging, :staging-<sha>     (test instances)
#   push to stable    -> :stable                      (client production)
#   push v* tag       -> :<version>, :<major>.<minor> (versioned pins)
#   manual dispatch   -> branch tag only (no :latest)
#
# Intentionally NO :latest tag — clients pin a channel and we move the
# channel forward only when we mean to. Compose files reference
#   image: ghcr.io/<owner>/hermes-workspace:stable
# and a watchtower/webhook upstream does the pull + recreate.
on:
  push:
    branches: [main, staging, stable]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix={{branch}}-,enable=${{ github.event_name == 'push' && github.ref_type == 'branch' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
